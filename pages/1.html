<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniReview — Обзор аналитики</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/common.css">
<style>
  .top-row { display: flex; gap: 24px; margin-bottom: 32px; }
  .sentiment-card { flex: 1; }
  .top5-card { width: 380px; flex-shrink: 0; }

  .sentiment-content { display: flex; align-items: flex-start; gap: 40px; }
  .donut-container { width: 160px; height: 160px; flex-shrink: 0; }
  .donut-container canvas { width: 160px; height: 160px; }
  .sentiment-total { font-size: 36px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .sentiment-label { font-size: 13px; color: var(--gray); margin-bottom: 24px; }
  .legend { display: flex; flex-direction: column; gap: 12px; }
  .legend-item { display: flex; align-items: center; justify-content: space-between; }
  .legend-left { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend-name { font-weight: 500; }
  .legend-right { display: flex; align-items: center; gap: 8px; }
  .legend-count { font-weight: 600; }
  .legend-pct { font-size: 13px; color: var(--gray); }

  .top5-list { display: flex; flex-direction: column; gap: 16px; }
  .top5-item { display: flex; align-items: center; gap: 14px; }
  .top5-rank { font-size: 15px; font-weight: 600; color: var(--gray); width: 18px; text-align: center; }
  .top5-name { font-weight: 600; line-height: 1.3; }
  .top5-mentions { font-size: 12px; color: var(--gray); }
  
  .tag { font-size: 12px; font-weight: 600; padding: 4px 14px; border-radius: 20px; white-space: nowrap; margin-left: auto; }
  .tag-positive { background: var(--green); color: #fff; }
  .tag-negative { background: var(--red); color: #fff; }
  .tag-mixed { background: var(--border); color: var(--gray); }

  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section-title svg { width: 20px; height: 20px; color: var(--gray); }

  .aspects-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .aspect-card { padding: 18px 20px; }
  .aspect-header { display: flex; gap: 10px; margin-bottom: 12px; }
  .aspect-icon { width: 32px; height: 32px; background: var(--bg); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .aspect-icon svg { width: 16px; height: 16px; color: var(--gray); }
  .aspect-name { font-size: 13px; font-weight: 600; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
  .aspect-mentions { font-size: 12px; color: var(--gray); }
  .aspect-bar { height: 6px; border-radius: 3px; display: flex; overflow: hidden; margin-bottom: 6px; }
  .aspect-bar span { height: 100%; }
  .aspect-pcts { display: flex; justify-content: space-between; }
  #sentimentStats { flex: 1; }
</style>
</head>
<body>

<script src="/static/icons.js"></script>
<script src="/static/api.js"></script>
<script src="/static/sidebar.js" data-active="overview"></script>

<main class="main">
  <h1 class="main-title">Обзор аналитики</h1>
  <p class="main-subtitle">Общая картина настроений студентов</p>

  <div class="top-row">
    <div class="card sentiment-card">
      <div class="card-title">Общая тональность отзывов</div>
      <div class="sentiment-content">
        <div class="donut-container"><canvas id="donutChart" width="320" height="320"></canvas></div>
        <div id="sentimentStats"></div>
      </div>
    </div>
    <div class="card top5-card">
      <div class="card-title">Топ-5 обсуждаемых сущностей</div>
      <div id="top5List" class="top5-list"></div>
    </div>
  </div>

  <div class="section-title" id="sectionAspects"></div>
  <div id="aspectsGrid" class="aspects-grid"></div>
</main>

<script>
const tagLabels = { positive: 'Позитив', negative: 'Негатив', mixed: 'Смешанный' };
const SENTIMENT_COLORS = { 'Позитивные': '#10b981', 'Негативные': '#f43f5e', 'Нейтральные': '#9ca3af' };

function renderSentiment(sentimentData) {
  const el = document.getElementById('sentimentStats');
  if (!sentimentData) { el.innerHTML = NO_DATA; return; }
  const total = sentimentData.reduce((s, d) => s + d.count, 0);

  el.innerHTML = `
    <div class="sentiment-total">${total.toLocaleString('en-US')}</div>
    <div class="sentiment-label">отзывов проанализировано</div>
    <div class="legend">${sentimentData.map(d => {
      const pct = Math.round(d.count / total * 100);
      const color = SENTIMENT_COLORS[d.label] || '#9ca3af';
      return `<div class="legend-item">
        <div class="legend-left"><span class="legend-dot" style="background:${color}"></span><span class="legend-name">${d.label}</span></div>
        <div class="legend-right"><span class="legend-count">${d.count}</span><span class="legend-pct">(${pct}%)</span></div>
      </div>`;
    }).join('')}</div>`;

  const ctx = document.getElementById('donutChart').getContext('2d');
  const cx = 160, cy = 160, R = 140, r = 90, gap = 0.03;
  let angle = -Math.PI / 2;
  sentimentData.forEach(d => {
    const sweep = (d.count / total) * Math.PI * 2 - gap;
    ctx.beginPath(); ctx.arc(cx, cy, R, angle, angle + sweep); ctx.arc(cx, cy, r, angle + sweep, angle, true); ctx.closePath();
    ctx.fillStyle = SENTIMENT_COLORS[d.label] || '#9ca3af'; ctx.fill(); angle += sweep + gap;
  });
}

function renderTop5(top5Data) {
  const el = document.getElementById('top5List');
  if (!top5Data) { el.innerHTML = NO_DATA; return; }
  el.innerHTML = top5Data.map((d, i) => `
    <div class="top5-item">
      <div class="top5-rank">${i + 1}</div>
      <div><div class="top5-name">${d.name}</div><div class="top5-mentions">${d.mentions} упоминаний</div></div>
      <span class="tag tag-${d.sentiment}">${tagLabels[d.sentiment]}</span>
    </div>`).join('');
}

function renderAspects(aspectsData) {
  document.getElementById('sectionAspects').innerHTML = svg('tableGrid') + ' Сводка по аспектам';
  const el = document.getElementById('aspectsGrid');
  if (!aspectsData) { el.innerHTML = NO_DATA; return; }
  el.innerHTML = aspectsData.map(d => {
    const neg = 100 - d.pos;
    return `<div class="card aspect-card">
      <div class="aspect-header"><div class="aspect-icon">${svg(aspectIcon(d.name))}</div><div><div class="aspect-name" title="${d.name}">${d.name}</div><div class="aspect-mentions">${d.mentions} упом.</div></div></div>
      <div class="aspect-bar"><span class="bar-positive" style="width:${d.pos}%"></span><span class="bar-negative" style="width:${neg}%"></span></div>
      <div class="aspect-pcts"><span class="percentage-diagram-text text-positive">${ARROW_UP}${d.pos}%</span><span class="percentage-diagram-text text-negative">${ARROW_DOWN}${neg}%</span></div>
    </div>`;
  }).join('');
}

Promise.all([
  fetchJSON('/api/aspects'),
  fetchJSON('/api/sentiment'),
  fetchJSON('/api/top5'),
]).then(([aspects, sentiment, top5]) => {
  renderSentiment(sentiment);
  renderTop5(top5);
  renderAspects(aspects);
});
</script>
</body>
</html>
